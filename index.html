<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مسجد النّور</title>

<!-- Google Font عربي -->
<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', Tahoma, sans-serif;
    background: #e6f2ef;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #0f5132, #198754);
    color: white;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

header h1 {
    font-family: 'Amiri', serif;
    font-size: 2.5em;
    margin: 0;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
}

header p {
    font-size: 1.2em;
    margin: 5px 0 0 0;
}

/* CONTAINER */
.container {
    padding: 30px 20px;
}

/* CARDS */
.card {
    background: white;
    margin: 25px auto;
    padding: 25px;
    max-width: 700px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: transform 0.3s, box-shadow 0.3s;
    border-top: 5px solid #198754;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

/* TITLES */
h2 {
    color: #0f5132;
    font-family: 'Amiri', serif;
    font-size: 1.8em;
    margin-bottom: 15px;
    border-bottom: 2px solid #198754;
    display: inline-block;
    padding-bottom: 5px;
}

/* IFRAME */
iframe {
    width: 100%;
    border-radius: 15px;
}

/* PRAYER TIMES WIDGET */
#mawaqit {
    border: 2px solid #198754;
    border-radius: 15px;
    overflow: hidden;
}

/* FOOTER */
footer {
    background: #0f5132;
    color: white;
    text-align: center;
    padding: 15px;
    font-size: 1em;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    header h1 {
        font-size: 2em;
    }
    h2 {
        font-size: 1.5em;
    }
}
</style>
</head>
<body>

<header>
    <h1>🕌 مسجد النّور</h1>
    <p>حي 8 ماي 1945 - بن ناصر - توقرت</p>
</header>

<div class="container">

    <!-- PRAYER TIMES -->
    <div class="card">
        <h2>🕓 أوقات الصلاة</h2>
        <div id="mawaqit"></div>
    </div>

    <!-- LOCATION -->
    <div class="card">
        <h2>📍 الموقع</h2>
        <iframe 
        src="https://maps.google.com/maps?q=33.1,6.06&z=15&output=embed"
        height="350">
        </iframe>
    </div>

    <!-- CONTACT -->
    <div class="card">
        <h2>📞 معلومات الاتصال</h2>
        <p>📧 mosquee.ennour.benaceur@gmail.com</p>
        <p>📱 07756000285</p>
    </div>

</div>

<footer>
    <p>© مسجد النّور - جميع الحقوق محفوظة</p>
</footer>

<!-- MAWAQIT SCRIPT -->
<script src="https://mawaqit.net/js/widget.js"></script>
<script>
new MawaqitWidget({
    mosqueUuid: "masjid-en-nour-benaceur",
    selector: "#mawaqit"
});
</script>

</body>
</html>
